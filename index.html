<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS: MARK-X OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHTNdI0bfTRFvTC0f-3JNasaw2sx9hKK4",
            authDomain: "tool-202d5.firebaseapp.com",
            databaseURL: "https://tool-202d5-default-rtdb.firebaseio.com",
            projectId: "tool-202d5",
            storageBucket: "tool-202d5.firebasestorage.app",
            messagingSenderId: "57625502347",
            appId: "1:57625502347:web:b24356c13c21a2ef8f6a8e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbGet = get;
    </script>

    <style>
        :root { --cyan: #00f2ff; --deep-blue: #00151c; --alert: #ff003c; }
        body, html { margin: 0; padding: 0; background: var(--deep-blue); color: var(--cyan); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }
        body::before { content: " "; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%; z-index: 10; pointer-events: none; }
        .hud-container { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .side-panel { position: absolute; padding: 20px; border: 1px solid var(--cyan); background: rgba(0, 242, 255, 0.05); font-size: 10px; clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%); z-index: 5; }
        #left-panel { top: 20px; left: 20px; width: 200px; }
        #right-panel { top: 20px; right: 20px; width: 200px; text-align: right; }
        .reactor-container { position: relative; width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 20; }
        .core { position: absolute; width: 100px; height: 100px; background: radial-gradient(circle, #fff 0%, var(--cyan) 50%, transparent 100%); border-radius: 50%; box-shadow: 0 0 50px var(--cyan); z-index: 5; transition: 0.3s; }
        .ring { position: absolute; border: 2px solid var(--cyan); border-radius: 50%; animation: rotate var(--d) linear infinite; }
        .r1 { width: 180px; height: 180px; border-style: dashed; --d: 10s; }
        .r2 { width: 220px; height: 220px; border-width: 5px; border-color: rgba(0,242,255,0.2); --d: 15s; direction: reverse; }
        .r3 { width: 260px; height: 260px; border-style: double; --d: 20s; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #display-text { margin-top: 50px; font-size: 1.2rem; text-align: center; max-width: 80%; min-height: 80px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--cyan); z-index: 20; }
        .listening .core { background: var(--alert); box-shadow: 0 0 80px var(--alert); }
        .settings-icon { position: fixed; bottom: 30px; right: 30px; font-size: 30px; cursor: pointer; z-index: 100; opacity: 0.5; }
        #settings-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 350px; background: rgba(0, 21, 28, 0.98); border: 2px solid var(--cyan); padding: 25px; display: none; z-index: 101; }
        input { width: 100%; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        .btn-prime { background: var(--cyan); color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="hud-container">
        <div id="left-panel" class="side-panel">SYSTEM: ONLINE<br>ENCRYPTION: ACTIVE<br>SATELLITE: LINKED</div>
        <div id="right-panel" class="side-panel">BOSS: AUTHORIZED<br>MODEL: ULTRA PRO<br>CLOUD: CONNECTED</div>

        <div class="reactor-container" id="reactor" onclick="startListening()">
            <div class="core"></div>
            <div class="ring r1"></div>
            <div class="ring r2"></div>
            <div class="ring r3"></div>
        </div>
        <div id="display-text">SYSTEM READY, BOSS.</div>
    </div>

    <i class="fas fa-ellipsis-v settings-icon" onclick="toggleSettings()"></i>

    <div id="settings-panel">
        <h3 style="text-align:center">CORE SETTINGS</h3>
        <label>OPENROUTER API KEY:</label>
        <input type="password" id="api-key-input" placeholder="Paste Key Here">
        <label>MODEL:</label>
        <input type="text" id="model-input" value="google/gemini-2.0-flash-001">
        <button class="btn-prime" onclick="saveSettings()">SYNC TO CLOUD</button>
    </div>

    <audio id="beep" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

    <script>
        let memory = [];
        let isSpeaking = false;
        const displayText = document.getElementById('display-text');

        function initAudio() {
            if (window.speechSynthesis.speaking) return;
            speak("All systems are operational. Standing by.");
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        async function saveSettings() {
            const key = document.getElementById('api-key-input').value;
            const mod = document.getElementById('model-input').value;
            localStorage.setItem('jarvis_api', key);
            localStorage.setItem('jarvis_model', mod);

            if(window.dbSet && window.dbRef) {
                try {
                    await window.dbSet(window.dbRef(window.db, 'jarvis/config'), { api: key, model: mod });
                    speak("Cloud synchronization complete.");
                } catch(e) { console.error(e); }
            }
            toggleSettings();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = text.match(/[a-zA-Z]/) ? 'en-US' : 'hi-IN';
            utter.rate = 1.0; 
            utter.onstart = () => isSpeaking = true;
            utter.onend = () => isSpeaking = false;
            window.speechSynthesis.speak(utter);
            typeWriter(text);
        }

        function typeWriter(text) {
            displayText.innerText = '';
            let i = 0;
            const interval = setInterval(() => {
                displayText.innerText += text.charAt(i);
                i++;
                if (i >= text.length) clearInterval(interval);
            }, 30);
        }

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hi-IN';
        
        recognition.onstart = () => {
            document.body.classList.add('listening');
            document.getElementById('beep').play();
            displayText.innerText = "Listening...";
        };

        recognition.onresult = (e) => {
            const cmd = e.results[0][0].transcript;
            document.body.classList.remove('listening');
            process(cmd);
        };

        function startListening() {
            if(!isSpeaking) recognition.start();
        }

        async function process(cmd) {
            if(cmd.toLowerCase().includes("open youtube")) {
                speak("Opening YouTube, Sir.");
                window.open("https://youtube.com", "_blank");
                return;
            }

            const apiKey = localStorage.getItem('jarvis_api');
            if(!apiKey || apiKey === "") {
                speak("Sir, please update the API key in settings.");
                return;
            }

            speak("Processing...");

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, 
                        "X-Title": "JARVIS MARK X"
                    },
                    body: JSON.stringify({
                        "model": localStorage.getItem('jarvis_model') || "google/gemini-2.0-flash-001",
                        "messages": [
                            {"role": "system", "content": "You are JARVIS. Speak in Hinglish. Be witty and smart. Start with 'Yes Boss' or 'Sir'."},
                            ...memory,
                            {"role": "user", "content": cmd}
                        ]
                    })
                });

                const data = await response.json();
                
                if(data.error) {
                    throw new Error(data.error.message);
                }

                const reply = data.choices[0].message.content;
                memory.push({role: "user", content: cmd}, {role: "assistant", content: reply});
                if(memory.length > 6) memory.splice(0, 2);
                speak(reply);

            } catch (err) {
                console.error(err);
                speak("Connection bottleneck detected. Please check your API key or network.");
            }
        }

        // Trigger: Volume Keys or 'J'
        window.addEventListener('keydown', (e) => {
            if (e.keyCode === 38 || e.keyCode === 40 || e.key.toLowerCase() === 'j') {
                startListening();
            }
        });
    </script>
</body>
  </html>
