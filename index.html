<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SnapClone - Snapchat जैसा एप्लिकेशन</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Main Container */
        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        /* Camera View */
        .camera-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Overlay Controls */
        .camera-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 10;
        }

        .capture-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid rgba(255,255,255,0.5);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .capture-btn:active {
            transform: scale(0.95);
        }

        .icon-btn {
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }

        .top-icon {
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        /* Filter Bar */
        .filter-bar {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            display: flex;
            gap: 10px;
            padding: 10px;
            overflow-x: auto;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .filter-option {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .filter-option.active {
            background: #fffc00;
            color: #000;
        }

        /* Stories Section */
        .stories-section {
            position: absolute;
            top: 80px;
            left: 0;
            right: 0;
            display: flex;
            gap: 15px;
            padding: 10px 15px;
            overflow-x: auto;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        .story-item {
            text-align: center;
            cursor: pointer;
        }

        .story-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(45deg, #fffc00, #ff6b00);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .story-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .story-name {
            font-size: 12px;
            margin-top: 5px;
        }

        /* Chat Section */
        .chat-section {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80%;
            background: #fff;
            color: #000;
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 20;
            display: flex;
            flex-direction: column;
        }

        .chat-section.open {
            transform: translateY(0);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 20px;
            background: #f0f0f0;
        }

        .message.sent .message-bubble {
            background: #fffc00;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }

        /* Memories Section */
        .memories-section {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 25;
            display: none;
            overflow-y: auto;
            padding: 20px;
        }

        .memories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 60px;
        }

        .memory-item {
            aspect-ratio: 1;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        /* Navigation */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 15px 20px 25px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            z-index: 15;
        }

        .nav-item {
            text-align: center;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .nav-item.active {
            opacity: 1;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .nav-label {
            font-size: 10px;
        }

        /* Modals */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 30;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #fff;
            color: #000;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 300px;
        }

        /* Timer Display */
        .timer-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 15;
            display: none;
        }

        /* Screenshot Alert */
        .screenshot-alert {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 100;
            display: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .streak-badge {
            background: #ff6b00;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Camera View -->
        <div class="camera-view" id="cameraView">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="top-icon" onclick="openProfile()">👤</div>
                <div class="top-icon" onclick="showStreak()">🔥 5</div>
                <div class="top-icon" onclick="openSettings()">⚙️</div>
            </div>

            <!-- Stories -->
            <div class="stories-section" id="storiesSection">
                <div class="story-item" onclick="addToStory()">
                    <div class="story-ring">

                <div class="filter-option" data-filter="bw">B&W</div>
                <div class="filter-option" data-filter="vivid">Vivid</div>
                <div class="filter-option" data-filter="sepia">Sepia</div>
            </div>

            <!-- Camera Controls -->
            <div class="camera-controls">
                <button class="icon-btn" onclick="toggleCamera()">🔄</button>
                <button class="capture-btn" onclick="captureSnap()"></button>
                <button class="icon-btn" onclick="openMemories()">📸</button>
            </div>

            <!-- Timer Display -->
            <div class="timer-display" id="timerDisplay"></div>
        </div>

        <!-- Chat Section -->
        <div class="chat-section" id="chatSection">
            <div class="chat-header">
                <span>💬 Chats</span>
                <button onclick="closeChat()" style="background:none;border:none;font-size:20px;">✕</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message received">
                    <div class="message-bubble">Hey! 👋</div>
                </div>
                <div class="message sent">
                    <div class="message-bubble">Hello!</div>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type a message...">
                <button class="icon-btn" onclick="sendMessage()" style="background:#fffc00;color:#000;">Send</button>
            </div>
        </div>

        <!-- Memories Section -->
        <div class="memories-section" id="memoriesSection">
            <div style="position:sticky;top:0;background:#000;padding:15px 0;">
                <button onclick="closeMemories()" style="background:none;border:none;color:#fff;font-size:20px;">← Back</button>
                <h3 style="margin-top:10px;">📱 Memories</h3>
            </div>
            <div class="memories-grid" id="memoriesGrid">
                <div class="memory-item">📸</div>
                <div class="memory-item">📸</div>
                <div class="memory-item">📸</div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('camera')">
                <div class="nav-icon">📷</div>
                <div class="nav-label">Camera</div>
            </div>
            <div class="nav-item" onclick="switchTab('chat')">
                <div class="nav-icon">💬</div>
                <div class="nav-label">Chat</div>
                <span id="unreadBadge" style="position:absolute;background:red;border-radius:50%;padding:2px 5px;font-size:10px;display:none;">1</span>
            </div>
            <div class="nav-item" onclick="switchTab('stories')">
                <div class="nav-icon">📖</div>
                <div class="nav-label">Stories</div>
            </div>
            <div class="nav-item" onclick="switchTab('profile')">
                <div class="nav-icon">👤</div>
                <div class="nav-label">Profile</div>
            </div>
        </div>

        <!-- Modals -->
        <div class="modal" id="profileModal">
            <div class="modal-content">
                <h3>My Profile</h3>
                <p>Username: @snapuser</p>
                <p>Snapscore: 1,234</p>
                <p>🔥 Streak: 5 days</p>
                <button onclick="closeModal()" style="margin-top:15px;padding:10px;width:100%;">Close</button>
            </div>
        </div>

        <div class="modal" id="settingsModal">
            <div class="modal-content">
                <h3>Settings</h3>
                <label>👻 Ghost Mode</label>
                <input type="checkbox" id="ghostMode"><br><br>
                <label>🔔 Notifications</label>
                <input type="checkbox" id="notifications" checked><br><br>
                <label>📸 Screenshot Alert</label>
                <input type="checkbox" id="screenshotAlert" checked><br><br>
                <button onclick="closeModal()" style="margin-top:15px;padding:10px;width:100%;">Save</button>
            </div>
        </div>

        <!-- Screenshot Alert -->
        <div class="screenshot-alert" id="screenshotAlert">⚠️ Screenshot detected!</div>
    </div>

    <script>
        // Global Variables
        let stream = null;
        let currentFilter = 'normal';

        let isRecording = false;

        // Initialize Camera
        async function initCamera() {
            try {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentCamera },
                    audio: false 
                });
                const video = document.getElementById('video');
                video.srcObject = stream;
                await video.play();
            } catch (err) {
                console.error('Camera error:', err);
                alert('Camera access denied. Please allow camera permissions.');
            }
        }

        // Toggle Camera Front/Back
        function toggleCamera() {
            currentCamera = currentCamera === 'user' ? 'environment' : 'user';
            initCamera();
        }

        // Apply Filter to Video
        function applyFilter(filter) {
            currentFilter = filter;
            const video = document.getElementById('video');
            switch(filter) {
                case 'vintage':
                    video.style.filter = 'sepia(0.5) contrast(1.2) brightness(0.9)';
                    break;
                case 'bw':
                    video.style.filter = 'grayscale(100%)';
                    break;
                case 'vivid':
                    video.style.filter = 'saturate(150%) contrast(1.1)';
                    break;
                case 'sepia':
                    video.style.filter = 'sepia(80%)';
                    break;
                default:
                    video.style.filter = 'none';
            }
        }

        // Capture Snap with Timer
        function captureSnap() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = canvas.toDataURL('image/jpeg');
            const snap = {
                id: Date.now(),
                image: imageData,
                timestamp: new Date(),
                timer: 5 // 5 seconds timer for viewing
            };
            
            snaps.unshift(snap);
            saveToMemories(imageData);
            showTimer(snap.timer, () => {
                alert('Snap captured! Send to friends?');
                openSendDialog(snap);
            });
        }

        // Show Timer
        function showTimer(seconds, callback) {
            const timerDisplay = document.getElementById('timerDisplay');
            let timeLeft = seconds;
            timerDisplay.style.display = 'block';
            timerDisplay.textContent = timeLeft;
            
            const interval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    timerDisplay.style.display = 'none';
                    if (callback) callback();
                }
            }, 1000);
        }

        // Save to Memories
        function saveToMemories(imageData) {
            let memories = JSON.parse(localStorage.getItem('memories') || '[]');
            memories.unshift({ id: Date.now(), image: imageData, date: new Date() });
            if (memories.length > 50) memories.pop();
            localStorage.setItem('memories', JSON.stringify(memories));
            updateMemoriesGrid();
        }

        // Update Memories Grid
        function updateMemoriesGrid() {
            const memories = JSON.parse(localStorage.getItem('memories') || '[]');
            const grid = document.getElementById('memoriesGrid');
            if (grid) {
                grid.innerHTML = memories.map(memory => `
                    <div class="memory-item" onclick="viewMemory('${memory.id}')">
                        <img src="${memory.image}" style="width:100%;height:100%;object-fit:cover;">
                    </div>
                `).join('');
            }
        }
